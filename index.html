<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="picross.js"></script>
    <title>Picross</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background: #3d669c;
            overflow: hidden;
            margin: 0px;
            width: 100vw;
            height: 100vh;
            user-select: none;
            font-family: 'Source Sans Pro', sans-serif;
        }

        table {
            border-collapse: collapse;
            width: fit-content;
            height: fit-content;
        }

        td {
            box-sizing: border-box;
        }

        tr:nth-child(5n + 1) {
            border-bottom: 2px solid black;
        }

        td:nth-child(5n + 1) {
            border-right: 2px solid black;
        }

        .board-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .row-numbers {
            white-space: nowrap;
            color: white;
            text-align: right;
            padding-left: 1vmin;
            padding-right: 1vmin;
            word-spacing: 1vmin;
        }

        .column-numbers {
            color: white;
            height: 100%;
            text-align: center;
            vertical-align: bottom;
            padding-top: 1vmin;
            line-height: 1.4;
        }

        .tile {
            transition-timing-function: ease-out;
            border-bottom: 1px solid #393F4A;
            border-right: 1px solid #393F4A;
            background: #80808040;
            /*box-shadow: inset 0 0 0.5vmin #00000040;*/
        }

        .tile_hover {
            z-index: 1;
            transition-duration: 0s;
            box-shadow: inset 0 0 1vmin #ffffff;
        }

        .tile_unguessed_filled {
            background: #10880080;
        }

        .tile_unguessed_empty {
            background: #86000080;
        }

        .tile_unguessed_wildcard {
            background: #828b0040;
            border-radius: 25%;
        }

        .tile_filled {
            background: #f0f0f0;
            /*box-shadow: inset 0 -0.3vmin 0.6vmin #00000040;*/
        }

        .tile_empty {
            background: #00000080;
            /*box-shadow: inset -0.1vmin 0.1vmin 0.2vmin #00000080, inset 0.1vmin -0.1vmin 0.1vmin #ffffff;*/
        }

        /* When selecting with left mouse button */
        .tile_selected_filled {
            background: #f0f0f080;
        }

        /* When selecting with right mouse button */
        .tile_selected_empty {
            background: #00000040;
        }

        .tile_guess_pop {
            animation: tile_guess_pop_anim 0.15s ease-out;
        }

        @keyframes tile_guess_pop_anim {
            0% {
                transform: scale(1);
            }

            30% {
                transform: scale(0.6);
            }

            100% {
                transform: scale(1);
            }
        }

        .faliure_mark {
            width: 100%;
            height: 100%;
            background-image: url("assets/mistake.png");
            background-size: contain;
            transform: scale(50%);
            opacity: 0%;
            animation: faliure_anim 0.3s ease-out 0s 1 normal forwards;
        }

        @keyframes faliure_anim {
            0% {
                transform: scale(50%);
                opacity: 0%;
            }

            25% {
                transform: scale(150%) rotate(0deg);
                opacity: 100%;
            }

            40% {
                transform: scale(150%) rotate(-10deg);
            }

            70% {
                transform: scale(150%) rotate(10deg);
            }

            85% {
                transform: scale(150%) rotate(0deg);
            }

            100% {
                transform: scale(100%);
                opacity: 100%;
            }
        }

        .crossed-out {
            color: #404040;
            text-decoration: line-through;
        }

        .new-game-panel {
            background-color: #404040b0;
            width: fit-content;
            padding: 2vmin;
            border-radius: 1vmin;
            position: relative;
            color: white;
            margin: 12px;
        }

        .seed-container {
            display: flex;
            flex-direction: row;
            margin-bottom: 1vmin;
            font-size: 2vmin;
        }

        .seed-text {
            margin: 0;
            margin-right: 1vmin;
        }

        .new-game-button {
            border: hidden;
            border-radius: 0.5vmin;
            padding: 0.8vmin;
            font-family: 'Source Sans Pro', sans-serif;
            font-size: 2vmin;
            font-weight: 600;
            background-color: white;
            box-shadow: inset 0 0 0.25vmin #000000;
            cursor: pointer;
        }

        .new-game-button:hover {
            box-shadow: inset 0 0 0.5vmin #000000;
        }

        .new-game-button:active {
            box-shadow: inset 0 0 0.5vmin #ff0000;
        }

        .number-input {
            width: 30px;
        }

        .win-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: none;
            z-index: 2;
            pointer-events: none;
        }

        .win-message {
            background-color: #404040d0;
            color: white;
            font-size: 4vmin;
            font-weight: 600;
            padding: 2vmin 3vmin;
            border-radius: 1vmin;
            box-shadow: 0 0 2vmin #000000a0;
            animation: win_message_pop 0.4s ease-out;
        }

        @keyframes win_message_pop {
            0% {
                transform: scale(0.5);
                opacity: 0%;
            }

            70% {
                transform: scale(1.1);
                opacity: 100%;
            }

            100% {
                transform: scale(1);
            }
        }

        .tile_win_wave {
            animation: tile_win_pulse 2s ease-in-out infinite;
        }

        @keyframes tile_win_pulse {
            0% {
                transform: scale(1);
            }

            15% {
                transform: scale(1.2) rotate(8deg);
                filter: brightness(1.4);
            }

            30% {
                transform: scale(1);
            }

            100% {
                transform: scale(1);
            }
        }

    </style>
</head>

<body onload="onLoad()" onmousedown="mousePressed(event)" onmouseup="mouseReleased(event)"
    onmouseleave="mouseLeave(event)" ondragstart="return false;" ondrop="return false;" oncontextmenu="return false;">
    <div class="new-game-panel">
        <div class="seed-container">
            <label style="margin-right: 1vmin;">Size:</label>
            <input id="board-rows-input" type="number" style="width: 40px;">
            <div style="margin: 4px;">x</div>
            <input id="board-columns-input" type="number" style="width: 40px;">
        </div>
        <!-- div class="seed-container">
            <label for="seed-input" style="margin-right: 1vmin;">Seed:</label>
            <input id="seed-input" type="number" style="width: 80px;">
        </div> -->
        <button class="new-game-button" onclick="OnNewGameButtonClicked()">New Game</button>
    </div>
    <table class="board-container">
        <tbody id="boardContainer"></tbody>
    </table>
    <div id="win-overlay" class="win-overlay">
        <div id="win-message-text" class="win-message"></div>
    </div>
</body>

</html>
